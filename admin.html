<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Diagnóstico 5D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange:      #C94B00;
      --orange-2:    #E8621A;
      --orange-pale: #FDE8D6;
      --white:       #FFFFFF;
      --off:         #FAFAF7;
      --warm:        #F5EDE0;
      --dark:        #180E06;
      --text:        #180E06;
      --text-2:      #6B5040;
      --text-3:      #A08878;
      --green:       #1A7A3A;
      --green-pale:  #E8F5ED;
      --yellow:      #7A5A00;
      --yellow-pale: #FFF8E0;
      --red:         #8B1A1A;
      --red-pale:    #FFF0F0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off);
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ─── Header ──────────────────────────────────── */
    .header {
      background: var(--dark);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
    }
    .logo span { color: var(--orange); }
    .header-badge {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(201,75,0,0.15);
      padding: 5px 12px;
      border-radius: 100px;
    }

    /* ─── Layout ──────────────────────────────────── */
    .page { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ─── Page title ──────────────────────────────── */
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--dark);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .page-sub { font-size: 0.9rem; color: var(--text-3); margin-bottom: 36px; }

    /* ─── Stats strip ─────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 1px 12px rgba(24,14,6,0.05);
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-3);
    }

    /* ─── Filters ─────────────────────────────────── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 100px;
      border: 1.5px solid rgba(24,14,6,0.15);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }

    /* ─── Submission list ─────────────────────────── */
    .submissions { display: flex; flex-direction: column; gap: 12px; }

    .sub-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 1px 12px rgba(24,14,6,0.05);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .sub-card:hover { box-shadow: 0 4px 24px rgba(24,14,6,0.1); }

    .sub-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      cursor: pointer;
      user-select: none;
    }
    .sub-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--orange-pale);
      color: var(--orange);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sub-info { flex: 1; min-width: 0; }
    .sub-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 2px;
    }
    .sub-meta {
      font-size: 0.8rem;
      color: var(--text-3);
    }
    .sub-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    /* Status badges */
    .badge {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
    }
    .badge-completo  { background: var(--green-pale);  color: var(--green); }
    .badge-parcial   { background: var(--yellow-pale); color: var(--yellow); }

    /* Bloco indicator */
    .bloco-indicator {
      display: flex;
      gap: 4px;
    }
    .bloco-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(24,14,6,0.12);
    }
    .bloco-dot.done { background: var(--orange); }

    .chevron {
      width: 18px; height: 18px;
      stroke: var(--text-3);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    .sub-card.open .chevron { transform: rotate(180deg); }

    /* ─── Expanded body ───────────────────────────── */
    .sub-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .sub-card.open .sub-body { max-height: 9999px; }

    .sub-body-inner {
      padding: 0 24px 28px;
      border-top: 1px solid rgba(24,14,6,0.07);
      padding-top: 24px;
    }

    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 700px) { .answers-grid { grid-template-columns: 1fr; } }

    .bloco-section { grid-column: 1 / -1; }
    .bloco-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(201,75,0,0.15);
    }
    .qa {
      background: var(--off);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .qa-q {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .qa-a {
      font-size: 0.9rem;
      color: var(--dark);
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .qa-a.empty { color: var(--text-3); font-style: italic; }

    /* ─── Bloco 6 form ────────────────────────────── */
    .bloco6-section {
      background: var(--warm);
      border-radius: 14px;
      padding: 24px;
      border: 1px solid rgba(201,75,0,0.12);
    }
    .bloco6-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .bloco6-sub {
      font-size: 0.82rem;
      color: var(--text-2);
      margin-bottom: 20px;
    }

    .b6-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .b6-table th {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(24,14,6,0.1);
    }
    .b6-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(24,14,6,0.06);
      vertical-align: top;
    }
    .b6-table tr:last-child td { border-bottom: none; }
    .b6-area {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
    }

    /* Status radio buttons */
    .status-radios { display: flex; gap: 6px; }
    .status-radio { display: none; }
    .status-label {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid rgba(24,14,6,0.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
      background: white;
    }
    .status-radio:checked + .status-label {
      border-width: 2px;
    }
    .status-radio[value="ok"]:checked     + .status-label { border-color: var(--green);  background: var(--green-pale); }
    .status-radio[value="atencao"]:checked + .status-label { border-color: #B07800;       background: var(--yellow-pale); }
    .status-radio[value="critico"]:checked + .status-label { border-color: var(--red);   background: var(--red-pale); }

    .b6-quebra {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--white);
      border: 1.5px solid rgba(24,14,6,0.12);
      border-radius: 8px;
      padding: 8px 12px;
      resize: vertical;
      min-height: 64px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .b6-quebra:focus { border-color: var(--orange); }

    .b6-field { margin-bottom: 14px; }
    .b6-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-2);
      margin-bottom: 6px;
      display: block;
    }
    .b6-textarea {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--white);
      border: 1.5px solid rgba(24,14,6,0.12);
      border-radius: 8px;
      padding: 10px 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .b6-textarea:focus { border-color: var(--orange); }

    .b6-save-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .b6-saved-msg {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .b6-saved-msg.show { opacity: 1; }

    /* ─── Buttons ─────────────────────────────────── */
    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 11px 24px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
    }
    .btn-orange { background: var(--orange); color: white; }
    .btn-orange:hover {
      background: var(--orange-2);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,75,0,0.3);
    }
    .btn-orange:active { transform: none; }

    /* ─── Loading / empty states ──────────────────── */
    .loading, .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .page { padding: 32px 14px 60px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">Sandro<span>.</span>Lopez</a>
    <span class="header-badge">Painel Admin</span>
  </header>

  <div class="page">

    <h1 class="page-title">Diagnósticos recebidos</h1>
    <p class="page-sub" id="page-sub">Carregando...</p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total de envios</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-completo">—</div>
        <div class="stat-label">Completos</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-parcial">—</div>
        <div class="stat-label">Em andamento</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('completo', this)">Completos</button>
      <button class="filter-btn" onclick="setFilter('parcial', this)">Em andamento</button>
    </div>

    <!-- List -->
    <div class="submissions" id="submissions">
      <div class="loading">Carregando diagnósticos...</div>
    </div>

  </div>

  <script>
    const QUESTIONS = [
      '', // index 0 unused
      'Quando você pensa em dinheiro, qual é o primeiro sentimento que vem?',
      'Você se vê como provedora ou como alguém que está tentando sobreviver?',
      'Você trabalha para pagar contas ou trabalha com propósito definido?',
      'Existe algo que você acredita que "pessoas como você" não conseguem ter?',
      'Quando alguém próximo prospera, qual é sua reação interna?',
      'Sua rotina diária é construída por você ou ditada pelas urgências?',
      'Você tem um tempo reservado para silêncio e direção — sem celular, sem tarefas?',
      'Você termina o que começa? Dê exemplos reais.',
      'Há decisões que você sabe que precisa tomar e está adiando? Quais?',
      'Você descansa com intencionalidade ou só para quando está esgotada?',
      'Você está se preparando ou esperando a oportunidade aparecer?',
      'Qual foi o último aprendizado que mudou sua forma de agir — não só de pensar?',
      'Você aceita correção com facilidade ou sente resistência?',
      'Existe algo na sua vida que está errado e você ainda não corrigiu?',
      'Você está na posição certa agora, ou está forçando uma porta que não é a sua?',
      'Você tem clareza do que foi chamada a fazer — ou ainda está testando possibilidades?',
      'Sua fé produz ação concreta ou produz espera passiva?',
      'Quem está na sua aliança mais próxima? Essas pessoas avançam ou estacionam?',
      'Você tem alguém que fala verdade para você — mesmo quando dói?',
      'Existe algo que Deus já falou pra você que você ainda não obedeceu?',
      'Você tem controle real do que entra e do que sai — ou só uma ideia aproximada?',
      'Você planta com constância ou só quando está motivada?',
      'Existe algo que consome seu tempo, dinheiro ou energia sem retorno real?',
      'Você já perdeu uma oportunidade por falta de preparo ou por medo?',
      'O que você faria diferente se soubesse que ia funcionar?',
    ];

    const BLOCOS = [
      { label: 'Bloco 1 — Identidade e Posição',     qs: [1,2,3,4,5]   },
      { label: 'Bloco 2 — Governo Interior',          qs: [6,7,8,9,10]  },
      { label: 'Bloco 3 — Preparação e Processo',     qs: [11,12,13,14,15] },
      { label: 'Bloco 4 — Fé, Ação e Aliança',        qs: [16,17,18,19,20] },
      { label: 'Bloco 5 — Prosperidade e Leis',       qs: [21,22,23,24,25] },
    ];

    const AREAS_B6 = [
      { key: 'id', label: 'Identidade' },
      { key: 'gi', label: 'Governo Interior' },
      { key: 'pr', label: 'Preparação' },
      { key: 'fa', label: 'Fé e Ação' },
      { key: 'po', label: 'Prosperidade' },
    ];

    let allData = [];
    let currentFilter = 'todos';

    async function load() {
      try {
        const res = await fetch('/api/diagnostico');
        allData = await res.json();
        renderStats();
        renderList();
        document.getElementById('page-sub').textContent =
          `${allData.length} diagnóstico${allData.length !== 1 ? 's' : ''} registrado${allData.length !== 1 ? 's' : ''}`;
      } catch (e) {
        document.getElementById('submissions').innerHTML =
          '<div class="empty">Erro ao carregar diagnósticos. O servidor está rodando?</div>';
      }
    }

    function renderStats() {
      const completos = allData.filter(d => d.status === 'completo').length;
      document.getElementById('stat-total').textContent   = allData.length;
      document.getElementById('stat-completo').textContent = completos;
      document.getElementById('stat-parcial').textContent  = allData.length - completos;
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function renderList() {
      const data = currentFilter === 'todos'
        ? allData
        : allData.filter(d => d.status === currentFilter);

      const container = document.getElementById('submissions');
      if (!data.length) {
        container.innerHTML = '<div class="empty">Nenhum diagnóstico encontrado.</div>';
        return;
      }
      container.innerHTML = data.map(d => renderCard(d)).join('');
    }

    function initials(nome) {
      return (nome || '?').split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
    }

    function fmtDate(dt) {
      if (!dt) return '';
      const d = new Date(dt.replace(' ', 'T'));
      return d.toLocaleDateString('pt-BR') + ' · ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function renderCard(d) {
      const blocoDots = Array.from({ length: 5 }, (_, i) =>
        `<div class="bloco-dot ${i < (d.ultimo_bloco || 0) ? 'done' : ''}"></div>`
      ).join('');

      const badge = d.status === 'completo'
        ? '<span class="badge badge-completo">Completo</span>'
        : '<span class="badge badge-parcial">Em andamento</span>';

      // Answers per bloco
      const answersHtml = BLOCOS.map(bloco => `
        <div class="bloco-section">
          <div class="bloco-title">${bloco.label}</div>
          <div class="answers-grid" style="grid-column:1/-1;">
            ${bloco.qs.map(n => {
              const ans = (d['q' + n] || '').trim();
              return `
                <div class="qa">
                  <div class="qa-q">${n}. ${QUESTIONS[n]}</div>
                  <div class="qa-a ${ans ? '' : 'empty'}">${ans || 'Não respondida'}</div>
                </div>`;
            }).join('')}
          </div>
        </div>
      `).join('');

      // Bloco 6 form
      const b6TableRows = AREAS_B6.map(area => {
        const statusVal = d['b6_' + area.key + '_status'] || '';
        const quebraVal = (d['b6_' + area.key + '_quebra'] || '').replace(/"/g, '&quot;');
        const radios = ['ok', 'atencao', 'critico'].map(v => {
          const emoji = v === 'ok' ? '✅' : v === 'atencao' ? '⚠️' : '❌';
          return `<input type="radio" class="status-radio" name="b6_${d.id}_${area.key}" id="b6_${d.id}_${area.key}_${v}" value="${v}" ${statusVal === v ? 'checked' : ''}>
                  <label class="status-label" for="b6_${d.id}_${area.key}_${v}">${emoji}</label>`;
        }).join('');
        return `
          <tr>
            <td><span class="b6-area">${area.label}</span></td>
            <td><div class="status-radios">${radios}</div></td>
            <td><textarea class="b6-quebra" id="b6_${d.id}_${area.key}_quebra" rows="2">${quebraVal}</textarea></td>
          </tr>`;
      }).join('');

      return `
        <div class="sub-card" id="card-${d.id}">
          <div class="sub-header" onclick="toggleCard(${d.id})">
            <div class="sub-avatar">${initials(d.nome)}</div>
            <div class="sub-info">
              <div class="sub-name">${d.nome}</div>
              <div class="sub-meta">${d.whatsapp || 'Sem WhatsApp'} · ${fmtDate(d.created_at)}</div>
            </div>
            <div class="sub-right">
              <div class="bloco-indicator">${blocoDots}</div>
              ${badge}
              <svg class="chevron" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </div>
          </div>
          <div class="sub-body">
            <div class="sub-body-inner">

              <!-- Respostas -->
              ${answersHtml}

              <!-- Bloco 6 -->
              <div class="bloco6-section">
                <div class="bloco6-title">Bloco 6 — Diagnóstico Final</div>
                <p class="bloco6-sub">Após analisar as respostas, mapeie as quebras identificadas.</p>

                <table class="b6-table">
                  <thead>
                    <tr>
                      <th style="width:160px">Área</th>
                      <th style="width:120px">Status</th>
                      <th>Quebra Identificada</th>
                    </tr>
                  </thead>
                  <tbody>${b6TableRows}</tbody>
                </table>

                <div class="b6-field">
                  <label class="b6-label" for="b6_${d.id}_gargalo">Gargalo principal</label>
                  <textarea class="b6-textarea" id="b6_${d.id}_gargalo" rows="3" placeholder="Área com mais quebras encadeadas...">${(d.b6_gargalo||'').replace(/"/g,'&quot;')}</textarea>
                </div>
                <div class="b6-field">
                  <label class="b6-label" for="b6_${d.id}_erro">Erro invisível</label>
                  <textarea class="b6-textarea" id="b6_${d.id}_erro" rows="3" placeholder="O que ela não vê mas que está travando tudo...">${(d.b6_erro_invisivel||'').replace(/"/g,'&quot;')}</textarea>
                </div>
                <div class="b6-field">
                  <label class="b6-label" for="b6_${d.id}_prox">Próximo movimento</label>
                  <textarea class="b6-textarea" id="b6_${d.id}_prox" rows="3" placeholder="Uma ação concreta para os próximos 7 dias...">${(d.b6_proximo_movimento||'').replace(/"/g,'&quot;')}</textarea>
                </div>

                <div class="b6-save-row">
                  <span class="b6-saved-msg" id="b6-msg-${d.id}">✓ Salvo com sucesso</span>
                  <button class="btn btn-orange" onclick="saveBloco6(${d.id})">Salvar diagnóstico</button>
                </div>
              </div>

            </div>
          </div>
        </div>`;
    }

    function toggleCard(id) {
      document.getElementById('card-' + id).classList.toggle('open');
    }

    async function saveBloco6(id) {
      const get = sel => (document.getElementById(sel) || {}).value || '';
      const getRadio = name => {
        const checked = document.querySelector(`input[name="${name}"]:checked`);
        return checked ? checked.value : '';
      };

      const payload = {
        b6_id_status: getRadio(`b6_${id}_id`),   b6_id_quebra: get(`b6_${id}_id_quebra`),
        b6_gi_status: getRadio(`b6_${id}_gi`),   b6_gi_quebra: get(`b6_${id}_gi_quebra`),
        b6_pr_status: getRadio(`b6_${id}_pr`),   b6_pr_quebra: get(`b6_${id}_pr_quebra`),
        b6_fa_status: getRadio(`b6_${id}_fa`),   b6_fa_quebra: get(`b6_${id}_fa_quebra`),
        b6_po_status: getRadio(`b6_${id}_po`),   b6_po_quebra: get(`b6_${id}_po_quebra`),
        b6_gargalo:           get(`b6_${id}_gargalo`),
        b6_erro_invisivel:    get(`b6_${id}_erro`),
        b6_proximo_movimento: get(`b6_${id}_prox`),
      };

      try {
        const res = await fetch(`/api/diagnostico/${id}/bloco6`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error();
        const msg = document.getElementById(`b6-msg-${id}`);
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 3000);
      } catch (_) {
        alert('Erro ao salvar. Tente novamente.');
      }
    }

    load();
  </script>
</body>
</html>
